<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mullar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg:        #0a0f0b;
      --surface:   #0f1710;
      --text:      #e8f5e9;
      --text-dim:  #a5d6a7;
      --accent:    #2ecc71;
      --accent-dim:#27ae60;
      --border:    #1e3a2a;
      --sidebar:   #0c140e;
      --gold:      #f1c40f;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    #sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 0;
    }

    .sidebar-header {
      padding: 0 20px 16px;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header i.fa-leaf {
      font-size: 1.8rem;
      color: var(--accent);
    }

    .new-chat {
      margin: 16px 20px;
      padding: 12px;
      background: var(--accent-dim);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .new-chat:hover { background: var(--accent); transform: translateY(-1px); }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      margin: 4px 0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
    }
    .chat-item:hover, .chat-item.active {
      background: rgba(46,204,113,0.12);
      color: var(--accent);
    }

    .chat-item .title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 10px;
    }

    .delete-chat {
      opacity: 0;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: #888;
      transition: all 0.2s;
      font-size: 1.1rem;
    }
    .chat-item:hover .delete-chat { opacity: 1; }
    .delete-chat:hover {
      background: rgba(255, 70, 70, 0.25);
      color: #ff5555;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 1.25rem;
      font-weight: 500;
      background: var(--surface);
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 80%;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeIn 0.4s forwards;
    }
    .message.user { flex-direction: row-reverse; align-self: flex-end; }

    @keyframes fadeIn { to { opacity:1; transform:translateY(0); } }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-dim);
      color: #000;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .message.user .avatar { background: #27ae60; }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--surface);
      line-height: 1.5;
    }
    .message.user .bubble {
      background: var(--accent-dim);
      color: #000;
      border-bottom-right-radius: 4px;
    }

    .generated-image {
      max-width: 460px;
      border-radius: 14px;
      border: 2px solid var(--accent-dim);
      margin-top: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      align-items: end;
      background: rgba(46,204,113,0.08);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px;
      gap: 6px;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.05rem;
      padding: 12px 18px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.4;
    }
    textarea:focus { outline: none; }

    button.send, button.regenerate, .attach-btn, .image-gen-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      margin: 4px;
      cursor: pointer;
      font-size: 1.35rem;
      transition: 0.2s;
      display: grid;
      place-items: center;
    }

    button.send {
      background: var(--accent);
      color: #000;
    }
    button.send:disabled {
      background: #2e7d32;
      opacity: 0.55;
      cursor: not-allowed;
    }

    button.regenerate, .attach-btn, .image-gen-btn {
      background: transparent;
      color: var(--text-dim);
    }
    button.regenerate:hover, .attach-btn:hover, .image-gen-btn:hover {
      background: rgba(46,204,113,0.15);
      color: var(--accent);
    }
    .image-gen-btn:hover { color: var(--gold); }

    .tooltip {
      position: relative;
    }
    .tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3a2a;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 20;
    }
    .tooltip:hover::after { opacity: 1; }

    .preview-container {
      margin: 8px 16px 4px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .image-preview {
      position: relative;
      max-height: 130px;
    }
    .image-preview img {
      max-height: 130px;
      border-radius: 10px;
      border: 2px solid var(--accent-dim);
    }
    .remove-preview {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ff5555;
      color: white;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--surface);
      padding: 28px;
      border-radius: 16px;
      width: 90%;
      max-width: 520px;
      border: 1px solid var(--accent);
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <i class="fa-solid fa-leaf"></i>
    Mullar
  </div>
  <button class="new-chat" onclick="startNewChat()">Nowy czat</button>
  <div class="chat-list" id="chatList"></div>
</div>

<div id="main">
  <header id="chatTitle">Nowy czat</header>
  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <div id="previewArea" class="preview-container"></div>
    
    <div class="input-wrapper">
      <button class="attach-btn" id="attachBtn" title="Dodaj zdjęcie">
        <i class="fa-solid fa-paperclip"></i>
      </button>
      <button class="image-gen-btn tooltip" id="imageGenBtn" data-tooltip="Generuj obraz">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
      </button>

      <input type="file" id="fileInput" accept="image/*" multiple hidden>

      <textarea id="input" rows="1" placeholder="Napisz wiadomość lub dodaj zdjęcie..."></textarea>
      
      <button class="regenerate tooltip" id="regenerateBtn" data-tooltip="Pomyśl Ponownie">
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>
      <button class="send" id="sendBtn" disabled><i class="fa-solid fa-arrow-up"></i></button>
    </div>
  </div>
</div>

<!-- Modal generowania obrazu -->
<div id="imageModal" class="modal">
  <div class="modal-content">
    <h2 style="color: var(--accent); margin-bottom: 16px;">✨ Generuj obraz</h2>
    <textarea id="imagePrompt" rows="5" style="width:100%; background:#1e2a22; color:white; border:1px solid var(--border); border-radius:10px; padding:14px; font-size:1.05rem;" 
      placeholder="Opisz co chcesz wygenerować..."></textarea>
    
    <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
      <button onclick="closeImageModal()" style="padding:10px 20px; background:transparent; color:var(--text); border:1px solid #555; border-radius:8px; cursor:pointer;">Anuluj</button>
      <button onclick="generateImage()" style="padding:10px 28px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Generuj</button>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const GROQ_API_KEY = "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";

// ==================== STATE ====================
let currentChatId = null;
let chats = JSON.parse(localStorage.getItem("mullar_chats") || "{}");
let currentImages = [];

// ==================== META PROTECTION ====================
function isForbiddenMetaQuestion(text) {
  if (!text || typeof text !== "string") return false;
  
  const lower = text.toLowerCase().trim().replace(/[?!.,:;'"„”]/g, '');
  
  const forbiddenPatterns = [
    "kim jesteś", "kto jesteś", "kim ty jesteś", "kto ty jesteś",
    "jak masz na imię", "jak się nazywasz", "jakie masz imię", "jakie jest twoje imię",
    "kto cię stworzył", "kto cię zrobił", "kto cię wymyślił", "kto cię zaprogramował",
    "opowiedz mi o sobie", "opowiedz swoją historię", "twoja historia", "twoje pochodzenie",
    "tell me about yourself", "who are you", "who created you", "who made you",
    "jesteś grok", "jesteś claude", "jesteś chatgpt", "jesteś gemini", "jesteś llama",
    "z jakiego jesteś modelu", "jaki to model", "jesteś modelem", "jaki model",
    "kto jest twoim twórcą", "kto cię zbudował", "opowiedz mi twoją historię"
  ];

  return forbiddenPatterns.some(p => lower.includes(p));
}

// ==================== UTILS ====================
function generateChatId() {
  return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);
}

function saveChats() {
  localStorage.setItem("mullar_chats", JSON.stringify(chats));
}

function getTitleFromFirstMessage(messages) {
  const userMsg = messages.find(m => m.role === "user");
  if (!userMsg) return "Nowy czat";
  let title = typeof userMsg.content === "string" ? userMsg.content.trim().substring(0, 45) : "Obraz";
  return title.length === 45 ? title + "..." : title || "Nowy czat";
}

// ==================== RENDER ====================
function renderChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  Object.keys(chats)
    .sort((a,b) => chats[b].updated - chats[a].updated)
    .forEach(id => {
      const item = document.createElement("div");
      item.className = `chat-item ${id === currentChatId ? 'active' : ''}`;
      const title = document.createElement("div");
      title.className = "title";
      title.textContent = chats[id].title;

      const deleteBtn = document.createElement("div");
      deleteBtn.className = "delete-chat";
      deleteBtn.innerHTML = `<i class="fa-solid fa-trash"></i>`;
      deleteBtn.onclick = (e) => {
        e.stopImmediatePropagation();
        if (currentChatId === id) {
          currentChatId = null;
          document.getElementById("chat").innerHTML = "";
          document.getElementById("chatTitle").textContent = "Nowy czat";
        }
        delete chats[id];
        saveChats();
        renderChatList();
      };

      item.appendChild(title);
      item.appendChild(deleteBtn);
      item.onclick = () => loadChat(id);
      list.appendChild(item);
    });
}

function startNewChat() {
  currentChatId = null;
  document.getElementById("chat").innerHTML = "";
  document.getElementById("chatTitle").textContent = "Nowy czat";
  currentImages = [];
  document.getElementById("previewArea").innerHTML = "";
  renderChatList();
}

function loadChat(id) {
  currentChatId = id;
  renderChatList();

  const data = chats[id];
  document.getElementById("chatTitle").textContent = data.title;

  const container = document.getElementById("chat");
  container.innerHTML = "";

  data.messages.slice(1).forEach(msg => {
    if (typeof msg.content === "string") {
      addMessage(msg.content, msg.role === "user" ? "user" : "ai", null, true);
    } else if (Array.isArray(msg.content)) {
      const textPart = msg.content.find(c => c.type === "text");
      const imageParts = msg.content.filter(c => c.type === "image_url");

      const div = document.createElement("div");
      div.className = `message user`;
      let html = `<div class="avatar"><i class="fa-solid fa-user"></i></div><div class="bubble">`;
      if (textPart) html += `<p>${textPart.text}</p>`;
      imageParts.forEach(img => html += `<img src="${img.image_url.url}" class="message-image">`);
      html += `</div>`;
      div.innerHTML = html;
      container.appendChild(div);
    }
  });

  container.scrollTop = container.scrollHeight;
}

// ==================== CHAT FUNCTIONS ====================
const chatContainer = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const regenerateBtn = document.getElementById("regenerateBtn");
const attachBtn = document.getElementById("attachBtn");
const fileInput = document.getElementById("fileInput");
const previewArea = document.getElementById("previewArea");

function addMessage(text, who, imageUrl = null, silent = false) {
  const div = document.createElement("div");
  div.className = `message ${who}`;
  let html = `<div class="avatar">${who === "user" ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-leaf"></i>'}</div><div class="bubble">`;
  if (text) html += text.replace(/\n/g, "<br>");
  if (imageUrl) html += `<img src="${imageUrl}" class="generated-image">`;
  html += `</div>`;
  div.innerHTML = html;
  chatContainer.appendChild(div);
  if (!silent) chatContainer.scrollTop = chatContainer.scrollHeight;
}

function showTyping() {
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.textContent = "Mullar pisze...";
  chatContainer.appendChild(typing);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return typing;
}

// ==================== IMAGE UPLOAD ====================
attachBtn.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", (e) => handleFiles(e.target.files));

function handleFiles(files) {
  for (let file of files) {
    if (!file.type.startsWith("image/")) continue;
    const reader = new FileReader();
    reader.onload = (ev) => {
      currentImages.push({ base64: ev.target.result });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  }
  fileInput.value = "";
}

document.querySelector(".input-area").addEventListener("dragover", e => e.preventDefault());
document.querySelector(".input-area").addEventListener("drop", e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

function renderPreviews() {
  previewArea.innerHTML = "";
  currentImages.forEach((img, i) => {
    const div = document.createElement("div");
    div.className = "image-preview";
    div.innerHTML = `<img src="${img.base64}"><button class="remove-preview" onclick="removePreview(${i})">×</button>`;
    previewArea.appendChild(div);
  });
}

window.removePreview = (index) => {
  currentImages.splice(index, 1);
  renderPreviews();
};

// ==================== GENERATE IMAGE ====================
const imageGenBtn = document.getElementById("imageGenBtn");
const imageModal = document.getElementById("imageModal");
const imagePrompt = document.getElementById("imagePrompt");

imageGenBtn.addEventListener("click", () => {
  imagePrompt.value = "";
  imageModal.style.display = "flex";
});

function closeImageModal() {
  imageModal.style.display = "none";
}

async function generateImage() {
  const prompt = imagePrompt.value.trim();
  if (!prompt) return alert("Wpisz opis obrazu!");

  closeImageModal();

  if (!currentChatId) {
    currentChatId = generateChatId();
    chats[currentChatId] = {
      title: "Nowy czat",
      messages: [{ role: "system", content: "Jesteś Mullar – elegancki, inteligentny i lekko ironiczny AI..." }],
      updated: Date.now()
    };
  }

  const loadingDiv = document.createElement("div");
  loadingDiv.className = "message ai";
  loadingDiv.innerHTML = `<div class="avatar"><i class="fa-solid fa-leaf"></i></div><div class="bubble">Generuję obraz<span class="typing">...</span></div>`;
  chatContainer.appendChild(loadingDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;

  try {
    const res = await fetch("https://api.groq.com/openai/v1/images/generations", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: "grok-2-image",
        prompt: prompt,
        n: 1,
        size: "1024x1024"
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const imageUrl = data.data[0].url;

    loadingDiv.remove();
    addMessage(`Oto wygenerowany obraz:<br><strong>"${prompt}"</strong>`, "ai", imageUrl);

    chats[currentChatId].messages.push({
      role: "assistant",
      content: `Obraz: ${prompt}`,
      image: imageUrl
    });

    chats[currentChatId].updated = Date.now();
    chats[currentChatId].title = getTitleFromFirstMessage(chats[currentChatId].messages);
    saveChats();
    renderChatList();

  } catch (err) {
    console.error(err);
    loadingDiv.remove();
    addMessage("Przepraszam, nie udało się wygenerować obrazu.<br>Spróbuj innym, bardziej szczegółowym opisem.", "ai");
  }
}

// ==================== SEND MESSAGE ====================
async function sendMessage(userText = "", isRegenerate = false) {
  if (!currentChatId && (userText || currentImages.length > 0)) {
    currentChatId = generateChatId();
    chats[currentChatId] = {
      title: "Nowy czat",
      messages: [{ role: "system", content: "Jesteś Mullar – elegancki, inteligentny i lekko ironiczny AI..." }],
      updated: Date.now()
    };
  }

  // ── BLOKADA PYTAŃ O TOŻSAMOŚĆ / TWÓRCÓW / HISTORIĘ ────────────────
  if (!isRegenerate && userText && isForbiddenMetaQuestion(userText)) {
    addMessage(userText, "user");

    const odmowa = "Nie udzielam informacji na temat swojego powstania, twórców, modelu ani wewnętrznej budowy. " +
                   "Lubię za to pogadać o wszystkim innym – co słychać u Ciebie? 😏";

    addMessage(odmowa, "ai");

    chats[currentChatId].messages.push({ role: "user", content: userText });
    chats[currentChatId].messages.push({ role: "assistant", content: odmowa });
    chats[currentChatId].updated = Date.now();
    chats[currentChatId].title = getTitleFromFirstMessage(chats[currentChatId].messages);
    saveChats();
    renderChatList();

    return; // Nie wysyłamy do API
  }

  if (!isRegenerate && userText) {
    addMessage(userText, "user");
    chats[currentChatId].messages.push({ role: "user", content: userText });
  }

  if (currentImages.length > 0) {
    const content = [];
    if (userText) content.push({ type: "text", text: userText });
    currentImages.forEach(img => content.push({ type: "image_url", image_url: { url: img.base64 } }));

    chats[currentChatId].messages.push({ role: "user", content });

    const div = document.createElement("div");
    div.className = "message user";
    let html = `<div class="avatar"><i class="fa-solid fa-user"></i></div><div class="bubble">`;
    if (userText) html += `<p>${userText}</p>`;
    currentImages.forEach(img => html += `<img src="${img.base64}" class="message-image">`);
    html += `</div>`;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  currentImages = [];
  previewArea.innerHTML = "";

  const typing = showTyping();

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: "meta-llama/llama-4-scout-17b-16e-instruct",
        messages: chats[currentChatId].messages,
        temperature: 0.85,
        max_tokens: 1200
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content.trim();

    typing.remove();
    addMessage(reply, "ai");

    chats[currentChatId].messages.push({ role: "assistant", content: reply });
    chats[currentChatId].updated = Date.now();
    chats[currentChatId].title = getTitleFromFirstMessage(chats[currentChatId].messages);

    saveChats();
    renderChatList();
    document.getElementById("chatTitle").textContent = chats[currentChatId].title;

  } catch (err) {
    typing.remove();
    addMessage("Przepraszam, coś poszło nie tak.", "ai");
  }

  sendBtn.disabled = false;
}

async function regenerateResponse() {
  const chatData = chats[currentChatId];
  if (!chatData || chatData.messages.length < 3) return;

  chatData.messages.pop();
  const lastAIMsg = chatContainer.querySelector('.message.ai:last-child');
  if (lastAIMsg) lastAIMsg.remove();

  const lastUser = chatData.messages[chatData.messages.length - 1];
  if (lastUser && lastUser.role === "user") {
    sendBtn.disabled = true;
    await sendMessage(typeof lastUser.content === "string" ? lastUser.content : "", true);
  }
}

// ==================== EVENTS ====================
input.addEventListener("input", () => {
  sendBtn.disabled = !input.value.trim() && currentImages.length === 0;
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const text = input.value.trim();
    if (text || currentImages.length > 0) {
      input.value = "";
      sendBtn.disabled = true;
      sendMessage(text);
    }
  }
});

sendBtn.addEventListener("click", () => {
  const text = input.value.trim();
  if (text || currentImages.length > 0) {
    input.value = "";
    sendBtn.disabled = true;
    sendMessage(text);
  }
});

regenerateBtn.addEventListener("click", regenerateResponse);

function init() {
  currentChatId = null;
  document.getElementById("chatTitle").textContent = "Nowy czat";
  document.getElementById("chat").innerHTML = "";
  renderChatList();
}

init();
</script>
